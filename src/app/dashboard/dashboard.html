<div class="dashboard-container">

    <button class="dashboard-btn primary" (click)="goToStockTake()" aria-label="Daily Stock Take">
        <span class="btn-label">Daily Stock Take</span>
    </button>

    <button class="dashboard-btn primary" (click)="goToSales()" aria-label="Sales">
        <span class="btn-label">Sales</span>
    </button>

    <button class="dashboard-btn primary" (click)="goToProducts()">Products</button>            
    <!-- routerLink="/products" -->

    <button class="dashboard-btn primary" (click)="goToUsers()">Users</button>

    <button class="dashboard-btn primary logout" (click)="goBack()">Logout</button>




    <div class="error-container" *ngIf="errorMessage">
        <div class="error-message">
            <h3>{{ errorMessage }}</h3>
        </div>
    </div>
</div>
