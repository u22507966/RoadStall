<div class="drop-down-container">

    <div class="dropdown-with-delete">
        <div class="drop-down">
            <label for="products">Select Product:</label>
            <select name="products" id="products" [(ngModel)]="selectedProduct">
                <option *ngFor="let item of stock" [ngValue]="item" >{{ item.stockName }}
                </option>
            </select>
        </div>
        <button class="delete-btn" (click)="deleteProduct()" title="Delete Product">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"></path>
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        </button>
        <button (click)="isEditingProduct = true; isAddingProduct = false;">Edit</button>
    </div>

    <div class="buttons">
        <button routerLink="/dashboard">BACK</button>
        <button (click)="isAddingProduct = true; isEditingProduct = false;">Add Product</button>
    </div>

</div>

<div class="addProduct" *ngIf="isAddingProduct">
    <form #addProdForm="ngForm" (ngSubmit)="addProduct()">
        <label for="productName">Product Name:</label>
        <input type="text" id="productName" name="productName" required [(ngModel)]="newName">

        <label for="productPrice">Price:</label>
        <input type="number" id="productPrice" name="productPrice" required [(ngModel)]="newPrice">

        <button type="submit" [disabled]="!addProdForm.form.valid">Add Product</button>
        <button (click)="isAddingProduct = false; isEditingProduct = false">Cancel</button>

    </form>
</div>

<div class="editProduct" *ngIf="isEditingProduct && selectedProduct">
    <form #editProdForm="ngForm" (ngSubmit)="editProduct()">
        <label for="productName">Product Name:</label>
        <input type="text" id="productName" name="productName" required [(ngModel)]="selectedProduct.stockName">

        <label for="productPrice">Price:</label>
        <input type="number" id="productPrice" name="productPrice" required [(ngModel)]="selectedProduct.price">

        <button type="submit" [disabled]="!editProdForm.form.valid">Save Changes</button>
        <button (click)="isAddingProduct = false; isEditingProduct = false">Cancel</button>

    </form>
</div>
